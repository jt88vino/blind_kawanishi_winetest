<body class="bg-stone-50 text-stone-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================================================
    // 👇 【重要】スプレッドシート（特定のシートID指定）のCSVエクスポートURL
    // ============================================================================

    // ============================================================================
    // 👇 【ロゴの設定】ご提示いただいたnoteの公開画像直リンク
    // ============================================================================
    const DEFAULT_LOGO_URL = "https://assets.st-note.com/production/uploads/images/233954636/profile_9ee7939ab1c2b0d090f5668ffb7d3155.png?width=80&height=80&dpr=2&crop=1:1,smart"; 

    // 1回に出せる問題数
    const QUESTIONS_PER_BATCH = 10;

    // === 起動時の一時的なサンプルデータ ===
    const defaultSampleData = `ID: 1
章: ワイン概論 - 基礎
問題: アプリの「出題順」を『五十音順』にすると、テーマ名があいうえお順に並び替えられます。
選択肢: 素晴らしい, 便利だ
正解: 素晴らしい
解説: 出題テーマを選択するプルダウンが五十音順に並び替わるように修正しました。
----------------------------------------
ID: 2
章: フランス - ボルドー地方
問題: 五十音順にすることで、解きたいテーマ（例えば「フランス」や「イタリア」）をすぐに見つけ出せます。
選択肢: なるほど, わかった
正解: なるほど
解説: 「すべて」のテーマを選んで五十音順に解けば、頭文字順に試験範囲を総ざらいできます。
----------------------------------------
ID: 3
章: イタリア - ピエモンテ州
問題: もちろん、テーマをランダムにシャッフルして解くモードも選ぶことができます。
選択肢: 完璧だ, すごい
正解: 完璧だ
解説: 用途に合わせて「五十音順」と「ランダム出題」を使い分けてください！
----------------------------------------`;

    // === SVGインラインアイコンコンポーネント群 (外部アイコン切れを防止するためにSVG化) ===
    const Icons = {

      ),

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
      ),
      CheckCircle: (props) => (

          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><polyline points="3 3 3 8 8 8" />

      Award: (props) => (

      Upload: (props) => (

        </svg>
      ),
      LinkIcon: (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />

      ),
      DownloadCloud: (props) => (

        </svg>
      ),
      Loader2: (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...props}>
          <path d="M21 12a9 9 0 1 1-6.21-8.56" />
        </svg>
      ),
      ListOrdered: (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <line x1="10" y1="6" x2="21" y2="6" /><line x1="10" y1="12" x2="21" y2="12" /><line x1="10" y1="18" x2="21" y2="18" /><path d="M4 6h1v4" /><path d="M4 10h2" /><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" />
        </svg>
      ),
      Shuffle: (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <polyline points="16 3 21 3 21 8" /><line x1="4" y1="20" x2="21" y2="3" /><polyline points="21 16 21 21 16 21" /><line x1="15" y1="15" x2="21" y2="21" /><line x1="4" y1="4" x2="9" y2="9" />
        </svg>
      ),
      Home: (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      )
    };

    // メインロゴコンポーネント（画像読み込み失敗時に上品なワインサークルを表示するフォールバック）
    const LogoImage = ({ className, onClick }) => {
      const [imgError, setImgError] = useState(false);
      
      if (imgError) {
        return (
          <div 
            onClick={onClick}
            className={`mx-auto bg-rose-950 border-2 border-rose-300 flex flex-col items-center justify-center cursor-pointer shadow-inner ${className}`}
          >
            <Icons.Wine className="w-1/2 h-1/2 text-rose-200" />
            <span className="text-[10px] text-rose-200 font-bold tracking-widest mt-0.5">川西</span>
          </div>
        );
      }
      return (
        <img 
          src={DEFAULT_LOGO_URL} 
          alt="メインロゴ" 
          className={`mx-auto object-cover cursor-pointer transition duration-300 active:scale-95 ${className}`} 
          onError={() => setImgError(true)} 
          onClick={onClick}
        />
      );
    };

    function App() {
      const [screen, setScreen] = useState('title'); 
      const [quizData, setQuizData] = useState([]); 
      const [selectedTheme, setSelectedTheme] = useState('すべて');
      const [isRandomOrder, setIsRandomOrder] = useState(false); 
      
      // 1回10問のセッション管理用State
      const [sessionQuestions, setSessionQuestions] = useState([]); 
      const [currentBatchIndex, setCurrentBatchIndex] = useState(0); 
      const [questions, setQuestions] = useState([]); 
      
      const [currentIndex, setCurrentIndex] = useState(0);
      
      // ユーザーの解答履歴を保持するState（キー: 問題インデックス, 値: 選択した選択肢）
      const [userAnswers, setUserAnswers] = useState({});
      
      const [seenWords, setSeenWords] = useState(new Set());
      const [message, setMessage] = useState('');
      const [importUrl, setImportUrl] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [isInitialLoading, setIsInitialLoading] = useState(true);

      // 🔒 管理者用ツールの隠し表示切り替えState
      const [logoClickCount, setLogoClickCount] = useState(0);
      const [showAdminTools, setShowAdminTools] = useState(false);

      // 🏠 ホーム画面へ戻る際の確認ダイアログ表示用State
      const [showHomeConfirm, setShowHomeConfirm] = useState(false);

      const EXCLUDED_KEYWORDS = ['システム', '管理', 'テスト', 'ダミー'];

      useEffect(() => {
        if (message && !message.includes('読込中') && !message.includes('お待ち')) {
          const timer = setTimeout(() => setMessage(''), 7000);
          return () => clearTimeout(timer);
        }
      }, [message]);

      // アプリ起動時の自動データ取得ロジック
      useEffect(() => {
        const fetchInitialData = async () => {
          if (DEFAULT_IMPORT_URL && DEFAULT_IMPORT_URL.trim() !== "") {
            setIsInitialLoading(true);
            setMessage('🔄 最新の問題データを自動読み込み中...');
            try {
              const response = await fetch(DEFAULT_IMPORT_URL);
              if (!response.ok) throw new Error('ネットワークエラー');
              const text = await response.text();
              const newData = parseData(text);
              if (newData.length > 0) {
                setQuizData(newData);
                setMessage(`🎉 ${newData.length} 件の問題を自動で読み込みました！`);
              } else {
                throw new Error('データが空です');
              }
            } catch (error) {
              console.error("データ読み込みエラー:", error);
              if (error.message === 'HTML_RESPONSE_ERROR') {
                setMessage('⚠️ 共有設定エラー：スプレッドシートのアクセス権が「制限付き」になっています。Googleドライブで対象スプレッドシートの共有を「リンクを知っている全員（閲覧者）」に設定してください。');
              } else if (error.message === 'データが空です') {
                setMessage('⚠️ 形式エラー：読み込んだデータの中に有効な問題（questionSentence 等）が見つかりません。シート構成を確認してください。');
              } else {
                setMessage('⚠️ 自動読み込みに失敗しました。通信環境、またはスプレッドシートの共有設定（リンクを知っている全員に公開されているか）をご確認ください。');
              }
              // サンプルデータへ安全にフォールバックしてクラッシュを防ぐ
              try {
                setQuizData(parseData(defaultSampleData));
              } catch (fallbackError) {
                console.error("サンプルフォールバック失敗:", fallbackError);
              }
            } finally {
              setIsInitialLoading(false);
            }
          } else {
            setQuizData(parseData(defaultSampleData));
            setIsInitialLoading(false);
          }
        };
        fetchInitialData();
      }, []);

      // ロゴタップ時の隠しコマンド処理
      const handleLogoClick = () => {
        if (showAdminTools) return; // すでに開いているなら何もしない
        const nextCount = logoClickCount + 1;
        setLogoClickCount(nextCount);
        if (nextCount >= 5) {
          setShowAdminTools(true);
          setMessage('🔑 管理者用ツールを開放しました。');
        }
      };

      // 👑 テーマ選択のプルダウンを「あいうえお（五十音）順」にソートする
      const themes = quizData.length > 0 
        ? ['すべて', ...Array.from(new Set(quizData.map(q => q.theme))).sort((a, b) => {
            return a.localeCompare(b, 'ja');
          })]
        : ['すべて'];

      // === データ解析ロジック ===
      const parseData = (rawString) => {
        const trimmed = rawString.trim();
        if (trimmed.startsWith('<!DOCTYPE') || trimmed.startsWith('<html') || trimmed.startsWith('<script')) {
          throw new Error('HTML_RESPONSE_ERROR');
        }

        const lines = trimmed.split('\n').map(line => {
          let l = line.trim();
          l = l.replace(/^"|"$/g, '').trim();
          if (l.includes('ID:') || l.includes('章:') || l.includes('問題:') || l.includes('選択肢:') || l.includes('正解:') || l.includes('解説:') || l.startsWith('---')) {
            l = l.replace(/,+$/, '').trim();
            l = l.replace(/^"|"$/g, '').trim(); 
          }
          return l;
        });

        const cleanedText = lines.join('\n');
        
        if (cleanedText.includes('ID:') || cleanedText.includes('章:') || cleanedText.includes('問題:')) {
          return processTextData(cleanedText);
        } else {
          return processCSVData(rawString); 
        }
      };

      const processTextData = (text) => {
        const blocks = text.split(/(?:-{10,}|" -{10,}")/);
        const newData = [];
        blocks.forEach((block, index) => {
          if (!block.trim()) return;
          const extract = (prefix) => {
            const regex = new RegExp(`^[\\s",]*${prefix}\\s*([\\s\\S]*?)(?=(?:^[\\s",]*(?:ID|章|問題|選択肢|正解|解説):|$))`, 'm');
            const match = block.match(regex);
            let res = match ? match[1].trim() : '';
            res = res.replace(/^"+|"+$/g, '').trim();
            return res;
          };
          const id = extract('ID:') || index;
          const theme = extract('章:') || 'その他';
          const question = extract('問題:');
          const optionsStr = extract('選択肢:');
          const correctAnswer = extract('正解:');
          const explanation = extract('解説:');

          if (!question || !optionsStr) return;
          
          const options = optionsStr.split(',').map(o => o.replace(/^"+|"+$/g, '').trim()).filter(o => o);
          if (EXCLUDED_KEYWORDS.some(keyword => theme.includes(keyword))) return;

          newData.push({
            id: Number(id) || index, 
            theme, question, options,
            correctAnswer: correctAnswer.replace(/^"+|"+$/g, '').trim() || options[0], 
            explanation: explanation || '解説はありません。'
          });
        });
        return newData;
      };

      const processCSVData = (csvText) => {
        const result = [];
        let row = [];
        let inQuotes = false;
        let val = "";
        for (let i = 0; i < csvText.length; i++) {
          const char = csvText[i];
          if (char === '"') {
            if (inQuotes && i + 1 < csvText.length && csvText[i + 1] === '"') { val += '"'; i++; } 
            else { inQuotes = !inQuotes; }
          } else if (char === ',' && !inQuotes) {
            row.push(val); val = "";
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && i + 1 < csvText.length && csvText[i + 1] === '\n') i++;
            row.push(val); result.push(row); row = []; val = "";
          } else {
            val += char;
          }
        }
        if (val !== "" || row.length > 0) { row.push(val); result.push(row); }
        if (result.length < 2) return [];
        
        const headers = result[0].map(h => h.trim());
        const getIdx = (candidates) => {
          for (const cand of candidates) {
            const idx = headers.findIndex(h => h.toLowerCase() === cand.toLowerCase() || h.includes(cand));
            if (idx !== -1) return idx;
          }
          return -1;
        };

        const idxId = getIdx(['id', 'ID', '番号', 'アイディー']);
        const idxQuestion = getIdx(['questionSentence', '問題', 'question', '問題文']);
        const idxExplanation = getIdx(['explanation', '解説', 'explanation', '説明']);
        const idxCorrectAnswer = getIdx(['correctAnswers.0', 'correctAnswer', '正解', '解答']);

        const finalIdxQuestion = idxQuestion !== -1 ? idxQuestion : (headers.length > 3 ? 3 : -1);
        if (finalIdxQuestion === -1) return [];

        const finalIdxExplanation = idxExplanation !== -1 ? idxExplanation : (headers.length > 4 ? 4 : -1);

        const optIndices = [];
        for(let i=0; i<10; i++) {
          const idx = headers.findIndex(h => h.toLowerCase() === `options.${i}` || h.toLowerCase() === `option.${i}` || h === `選択肢${i}` || h === `選択肢.${i}`);
          if(idx !== -1) optIndices.push(idx);
        }

        if (optIndices.length === 0) {
          headers.forEach((h, idx) => {
            if (idx !== idxId && idx !== 0 && idx !== finalIdxQuestion && idx !== finalIdxExplanation && idx !== idxCorrectAnswer) {
              optIndices.push(idx);
            }
          });
        }

        const newData = [];
        for (let i = 1; i < result.length; i++) {
          const r = result[i];
          if (r.length < headers.length || !r[finalIdxQuestion]) continue; 
          
          const qId = idxId !== -1 && r[idxId] ? Number(r[idxId]) : i;
          let theme = r[0] ? r[0].trim() : 'その他';
          
          if (theme === headers[0] || theme.toLowerCase() === 'title' || theme.toLowerCase() === 'chaptertitle' || theme === '章') continue;
          if (EXCLUDED_KEYWORDS.some(keyword => theme.includes(keyword))) continue;

          let options = optIndices.map(idx => r[idx]).filter(v => v && v.trim() !== '');
          if (options.length === 0) {
            options = ['選択肢1', '選択肢2', '選択肢3', '選択肢4'];
          }
          
          const correctAnswer = idxCorrectAnswer !== -1 && r[idxCorrectAnswer] ? r[idxCorrectAnswer].trim() : options[0];

          newData.push({
            id: qId, 
            theme: theme,
            question: r[finalIdxQuestion].replace(/\\n/g, '\n'),
            options: options,
            correctAnswer: correctAnswer,
            explanation: finalIdxExplanation !== -1 && r[finalIdxExplanation] ? r[finalIdxExplanation].replace(/\\n/g, '\n') : '解説はありません。'
          });
        }
        return newData;
      };

      const handleUrlImport = async () => {
        if (!importUrl) return;
        setIsLoading(true);
        setMessage('🔄 外部データを読み込み中...');
        try {
          const response = await fetch(importUrl);
          if (!response.ok) throw new Error('ネットワークエラー');
          const text = await response.text();
          const newData = parseData(text);
          if (newData.length > 0) {
            setQuizData(newData);
            setSelectedTheme('すべて');
            setMessage(`🎉 手動参照成功: ${newData.length} 件を読み込みました！`);
            setImportUrl(''); 
          } else { throw new Error('データ無し'); }
        } catch (error) {
          setMessage('エラー：URLからデータを取得できませんでした。');
        } finally { setIsLoading(false); }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsLoading(true);
        const reader = new FileReader();
        reader.onload = (event) => {
          const newData = parseData(event.target.result);
          if (newData.length > 0) {
            setQuizData(newData);
            setSelectedTheme('すべて');
            setMessage(`🎉 ファイルから ${newData.length} 件を読み込みました！`);
          } else { setMessage('エラー：読み込めませんでした。'); }
          setIsLoading(false);
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const formatText = (text, isQuestion) => {
        if (!text) return "";
        const regex = /([a-zA-ZÀ-ÿ0-9\-\.]+([\s][a-zA-ZÀ-ÿ0-9\-\.]+)*)（([^）]+)）/g;
        if (isQuestion) return text.replace(regex, "$1");
        let result = text;
        result = result.replace(regex, (match, word) => {
          const normalizedWord = word.trim().toLowerCase();
          if (seenWords.has(normalizedWord)) { return word; } 
          else { seenWords.add(normalizedWord); return match; }
        });
        return result;
      };

      // === クイズ開始 ===
      const startQuiz = () => {
        let filtered = selectedTheme === 'すべて' ? [...quizData] : quizData.filter(q => q.theme === selectedTheme);
        
        if (isRandomOrder) {
          filtered.sort(() => Math.random() - 0.5); 
        } else {
          // 五十音順（あいうえお順）かつ ID順でソート
          filtered.sort((a, b) => {
            const themeCmp = a.theme.localeCompare(b.theme, 'ja');
            if (themeCmp !== 0) return themeCmp;
            return a.id - b.id;
          });
        }

        setSessionQuestions(filtered);
        setCurrentBatchIndex(0);
        setQuestions(filtered.slice(0, QUESTIONS_PER_BATCH)); 
        setCurrentIndex(0); 
        setUserAnswers({}); 
        setScreen('quiz');
      };

      // === 次の10問へ進む ===
      const handleNextBatch = () => {
        const nextIndex = currentBatchIndex + 1;
        setCurrentBatchIndex(nextIndex);
        setQuestions(sessionQuestions.slice(nextIndex * QUESTIONS_PER_BATCH, (nextIndex + 1) * QUESTIONS_PER_BATCH));
        setCurrentIndex(0);
        setUserAnswers({}); 
        setScreen('quiz');
      };

      const handleAnswer = (option) => {
        if (userAnswers[currentIndex]) return; 
        setUserAnswers(prev => ({ ...prev, [currentIndex]: option }));
        setSeenWords(new Set()); 
      };

      const handleNext = () => {
        if (currentIndex < questions.length - 1) {
          setCurrentIndex(currentIndex + 1); 
        } else { 
          setScreen('result'); 
        }
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
        }
      };

      // スコアの計算
      const currentScore = questions.reduce((acc, q, idx) => {
        return acc + (userAnswers[idx] === q.correctAnswer ? 1 : 0);
      }, 0);


      // === 画面レンダリング ===
      if (screen === 'title') {
        return (
          <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center p-6 text-stone-800 font-sans animate-in">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-stone-200">
              <div className="bg-rose-900 p-8 text-center text-white font-sans">
                <LogoImage className="w-20 h-20 mb-4 rounded-full border-2 border-white/20 shadow-lg" onClick={handleLogoClick} />
                <h1 className="text-2xl font-bold tracking-wider font-sans">ソムリエ / ワインエキスパート</h1>
                <p className="mt-2 text-rose-200 text-sm font-sans font-medium">試験対策ドリル <span className="font-bold">byブラインド川西</span></p>
              </div>
              
              <div className="p-6">
                {isInitialLoading ? (
                   <div className="flex flex-col items-center justify-center py-8 text-stone-500">
                     <Icons.Loader2 className="w-10 h-10 mb-4 text-rose-800" />
                     <p className="font-bold font-sans">問題データを取得中...</p>
                   </div>
                ) : (
                  <>
                    <div className="mb-4">
                      <label className="block text-sm font-semibold text-stone-600 mb-2 font-sans font-bold">出題テーマを選択 (現在 {quizData.length} 問)</label>
                      <select 
                        className="w-full p-3 border border-stone-300 rounded-lg bg-stone-50 text-stone-800 focus:outline-none focus:ring-2 focus:ring-rose-800 font-medium font-sans"
                        value={selectedTheme}
                        onChange={(e) => setSelectedTheme(e.target.value)}
                      >
                        {themes.map(t => (
                          <option key={t} value={t}>{t}</option>
                        ))}
                      </select>
                    </div>

                    <div className="mb-6">
                      <label className="block text-sm font-semibold text-stone-600 mb-2 font-sans font-bold">出題の順番</label>
                      <div className="flex bg-stone-100 p-1 rounded-lg border border-stone-200 font-medium font-sans">
                        <button
                          onClick={() => setIsRandomOrder(false)}
                          className={`flex-1 py-2 text-sm font-bold rounded-md flex items-center justify-center gap-2 transition ${!isRandomOrder ? 'bg-white shadow-sm text-rose-800' : 'text-stone-500 hover:text-stone-700'}`}
                        >
                          <Icons.ListOrdered className="w-4 h-4" />
                          五十音順 (体系的)
                        </button>
                        <button
                          onClick={() => setIsRandomOrder(true)}
                          className={`flex-1 py-2 text-sm font-bold rounded-md flex items-center justify-center gap-2 transition ${isRandomOrder ? 'bg-white shadow-sm text-rose-800' : 'text-stone-500 hover:text-stone-700'}`}
                        >
                          <Icons.Shuffle className="w-4 h-4" />
                          ランダム (テスト)
                        </button>
                      </div>
                    </div>

                    <button 
                      onClick={startQuiz}
                      disabled={quizData.length === 0 || isLoading}
                      className="w-full py-4 bg-rose-800 hover:bg-rose-900 disabled:bg-stone-300 text-white rounded-lg font-bold text-lg transition duration-200 flex items-center justify-center gap-2 mb-6 shadow-md font-sans"
                    >
                      <Icons.BookOpen className="w-5 h-5" />
                      {isLoading ? '処理中...' : '学習を始める'}
                    </button>
                  </>
                )}

                {message && (
                  <div className={`mb-6 p-3 rounded-lg text-xs font-bold animate-in font-sans ${message.includes('エラー') || message.includes('失敗') || message.includes('⚠️') ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                    {message}
                  </div>
                )}

                {/* 🛠️ 管理者用ツール (普段は完全に非表示、ロゴを5回タップすると出現) */}
                {showAdminTools && (
                  <div className="border-t border-stone-200 pt-6 bg-stone-50 -mx-6 px-6 pb-2 rounded-b-2xl animate-in">
                    <h3 className="text-xs font-bold text-stone-500 mb-4 flex items-center gap-2 font-sans">
                      <Icons.DownloadCloud className="w-4 h-4" />
                      管理者用ツール (手動更新)
                    </h3>
                    <div className="mb-4">
                      <div className="flex gap-2">
                        <div className="relative flex-1">
                          <Icons.LinkIcon className="w-4 h-4 absolute left-3 top-2.5 text-stone-400" />
                          <input 
                            type="text" 
                            placeholder="別URLから一時読込..."
                            value={importUrl}
                            onChange={(e) => setImportUrl(e.target.value)}
                            className="w-full pl-9 p-2 text-xs border border-stone-300 rounded-lg focus:ring-2 focus:ring-rose-500 outline-none font-sans"
                          />
                        </div>
                        <button 
                          onClick={handleUrlImport}
                          disabled={isLoading}
                          className="px-3 py-2 bg-stone-700 hover:bg-stone-800 text-white text-xs font-bold rounded-lg transition font-sans"
                        >
                          読込
                        </button>
                      </div>
                    </div>
                    <div className="mt-2">
                      <label className="cursor-pointer flex items-center justify-center gap-2 px-4 py-2 w-full border border-stone-300 rounded-lg text-xs font-bold text-stone-600 bg-white hover:bg-stone-100 transition font-sans">
                        <Icons.Upload className="w-3 h-3" />
                        端末のファイルから一時読込 (.txt/.csv)
                        <input type="file" accept=".txt,.csv" className="hidden" onChange={handleFileUpload} />
                      </label>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        const hasNextBatch = (currentBatchIndex + 1) * QUESTIONS_PER_BATCH < sessionQuestions.length;
        const progressCount = Math.min((currentBatchIndex + 1) * QUESTIONS_PER_BATCH, sessionQuestions.length);

        // 👑 得点に応じたメッセージの判定（ご指定の4段階に変更）
        let resultMessage = '';
        if (currentScore <= 3) {
          resultMessage = 'まだまだ勉強不足';
        } else if (currentScore <= 6) {
          resultMessage = 'やるやん！この調子やで！';
        } else if (currentScore <= 9) {
          resultMessage = 'このまま頑張ったら試験受かるんちゃう？';
        } else if (currentScore === 10) {
          resultMessage = '天才かよ…継続こそが\n大切です！';
        }

        return (
          <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center p-6 text-stone-800 font-sans animate-in">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border border-stone-200">
              
              {/* メインロゴと吹き出しの表示 */}
              <div className="text-center mb-8 mt-2">
                <div className="relative inline-block mb-4 max-w-full">
                  <div className="bg-white border-2 border-rose-800 text-rose-800 font-extrabold text-xl py-3 px-6 rounded-xl shadow-md z-10 relative whitespace-pre-wrap animate-bounce font-sans">
                    {resultMessage}
                    <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-b-2 border-r-2 border-rose-800 transform rotate-45"></div>
                  </div>
                </div>
                <LogoImage className="w-32 h-32 rounded-full border-4 border-rose-900/10 shadow-xl" />
              </div>

              <h2 className="text-2xl font-bold mb-2 font-sans font-bold">結果発表</h2>
              <p className="text-lg text-stone-600 mb-1 font-sans">{selectedTheme} （第 {currentBatchIndex + 1} セット）</p>
              <p className="text-xs text-stone-500 font-bold bg-stone-100 py-1 px-3 rounded-full inline-block mb-6 font-sans">
                進捗: {progressCount} / {sessionQuestions.length} 問
              </p>

              <div className="text-5xl font-extrabold text-rose-900 mb-8 font-sans">
                {currentScore} <span className="text-2xl text-stone-500 font-normal">/ {questions.length}</span>
              </div>

              <div className="space-y-3">
                {hasNextBatch ? (
                  <button 
                    onClick={handleNextBatch}
                    className="w-full py-4 bg-rose-800 hover:bg-rose-900 text-white rounded-lg font-bold transition duration-200 flex items-center justify-center gap-2 shadow-md font-sans"
                  >
                    次の10問へ進む
                    <Icons.ArrowRight className="w-5 h-5" />
                  </button>
                ) : (
                  <div className="p-4 bg-green-50 border border-green-200 text-green-800 rounded-lg font-bold mb-4 font-sans">
                    🎉 このテーマの全問題をコンプリートしました！
                  </div>
                )}
                
                <button 
                  onClick={() => setScreen('title')}
                  className={`w-full py-4 rounded-lg font-bold transition duration-200 flex items-center justify-center gap-2 font-sans ${hasNextBatch ? 'bg-stone-200 hover:bg-stone-300 text-stone-700' : 'bg-stone-800 hover:bg-stone-900 text-white shadow-md'}`}
                >
                  <Icons.RotateCcw className="w-5 h-5" />
                  タイトルへ戻る
                </button>
              </div>
            </div>
          </div>
        );
      }

      // クイズ画面
      const currentQ = questions[currentIndex];
      const isAnswered = userAnswers[currentIndex] !== undefined;
      const selectedOption = userAnswers[currentIndex];
      const isCorrect = selectedOption === currentQ.correctAnswer;
      const currentTotalProgress = currentBatchIndex * QUESTIONS_PER_BATCH + currentIndex + 1;

      return (
        <div className="min-h-screen bg-stone-50 py-10 px-4 flex flex-col items-center font-sans animate-in">
          <div className="max-w-2xl w-full">
            <div className="flex justify-between items-end mb-6 text-sm font-bold text-stone-500 border-b border-stone-200 pb-4">
              <span className="bg-rose-100 text-rose-900 px-3 py-1 rounded-full truncate max-w-[45%] font-sans font-bold">{currentQ.theme}</span>
              
              <div className="flex items-center gap-3">
                <div className="text-right leading-tight font-sans">
                  <div className="text-lg text-stone-700 font-bold">Q {currentIndex + 1} <span className="text-sm text-stone-400 font-normal font-sans">/ {questions.length}</span></div>
                  <div className="text-xs text-stone-400 font-normal mt-0.5">進捗: {currentTotalProgress} / {sessionQuestions.length}</div>
                </div>
                
                {/* 🏠 いつでもホームに戻れるボタン（クイズ進行中） */}
                <button 
                  onClick={() => setShowHomeConfirm(true)}
                  className="flex items-center gap-1 px-3 py-2 bg-stone-200 hover:bg-stone-300 text-stone-700 rounded-xl text-xs font-bold transition shadow-sm font-sans"
                  title="ホームに戻る"
                >
                  <Icons.Home className="w-3.5 h-3.5" />
                  ホーム
                </button>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-stone-200 p-6 md:p-8 mb-6">
              <p className="text-lg md:text-xl font-medium text-stone-800 leading-relaxed whitespace-pre-wrap font-sans">
                {formatText(currentQ.question, true)}
              </p>
            </div>

            <div className="space-y-3 mb-8">
              {currentQ.options.map((opt, idx) => {
                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition duration-200 font-medium text-lg font-sans ";
                if (!isAnswered) {
                  btnClass += "border-stone-200 bg-white hover:border-rose-300 hover:bg-rose-50 text-stone-700";
                } else {
                  if (opt === currentQ.correctAnswer) btnClass += "border-green-500 bg-green-50 text-green-800";
                  else if (opt === selectedOption) btnClass += "border-red-400 bg-red-50 text-red-800";
                  else btnClass += "border-stone-200 bg-stone-50 text-stone-400 opacity-60";
                }
                return (
                  <button key={idx} disabled={isAnswered} onClick={() => handleAnswer(opt)} className={btnClass}>
                    <div className="flex items-center justify-between">
                      <span>{opt}</span>
                      {isAnswered && opt === currentQ.correctAnswer && <Icons.CheckCircle className="w-6 h-6 text-green-600 flex-shrink-0" />}
                      {isAnswered && opt === selectedOption && opt !== currentQ.correctAnswer && <Icons.XCircle className="w-6 h-6 text-red-500 flex-shrink-0" />}
                    </div>
                  </button>
                );
              })}
            </div>

            {/* 解説とナビゲーションボタンエリア（回答後に表示） */}
            {isAnswered && (
              <div className="animate-in">
                <div className={`rounded-2xl shadow-md border p-6 md:p-8 mb-8 font-sans ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                  <h3 className={`text-xl font-bold mb-4 flex items-center gap-2 ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                    {isCorrect ? <Icons.CheckCircle className="w-6 h-6" /> : <Icons.XCircle className="w-6 h-6" />}
                    {isCorrect ? "正解！" : "不正解..."}
                  </h3>
                  <div className="text-stone-700 leading-relaxed space-y-4">
                    <div className="pb-4">
                      <h4 className="font-bold text-stone-800 mb-2">【解説】</h4>
                      <p className="whitespace-pre-wrap font-sans">{formatText(currentQ.explanation, false)}</p>
                    </div>
                  </div>
                </div>

                <div className="flex gap-4">
                  {currentIndex > 0 && (
                    <button 
                      onClick={handlePrev}
                      className="flex-1 py-4 bg-white border-2 border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl font-bold text-lg transition duration-200 flex items-center justify-center gap-2 shadow-sm font-sans"
                    >
                      <Icons.ArrowLeft className="w-5 h-5" />
                      前の問題
                    </button>
                  )}
                  <button 
                    onClick={handleNext}
                    className="flex-1 py-4 bg-stone-800 hover:bg-stone-900 text-white rounded-xl font-bold text-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg font-sans"
                  >
                    {currentIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'}
                    <Icons.ArrowRight className="w-5 h-5" />
                  </button>
                </div>
              </div>
            )}

            {/* 未回答時でも、2問目以降なら前に戻れるボタンを設置 */}
            {!isAnswered && currentIndex > 0 && (
              <div className="flex justify-start mb-8">
                <button 
                  onClick={handlePrev}
                  className="py-3 px-6 bg-white border-2 border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl font-bold text-md transition duration-200 flex items-center justify-center gap-2 shadow-sm font-sans"
                >
                  <Icons.ArrowLeft className="w-5 h-5" />
                  前の問題に戻る
                </button>
              </div>
            )}
          </div>

          {/* 🏠 タイトルへ戻る際の確認カスタムモーダル（警告確認） */}
          {showHomeConfirm && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-in">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center border border-stone-200 font-sans">
                <h3 className="text-lg font-bold text-stone-800 mb-2">タイトルに戻りますか？</h3>
                <p className="text-sm text-stone-500 mb-6">現在のクイズセット（第 {currentBatchIndex + 1} セット）の進行状況やスコアはリセットされます。</p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setShowHomeConfirm(false)}
                    className="flex-1 py-3 bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold rounded-xl text-sm transition"
                  >
                    キャンセル
                  </button>
                  <button 
                    onClick={() => {
                      setShowHomeConfirm(false);
                      setScreen('title');
                    }}
                    className="flex-1 py-3 bg-rose-800 hover:bg-rose-900 text-white font-bold rounded-xl text-sm transition"
                  >
                    タイトルに戻る
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
