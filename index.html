    var defaultSampleData="ID: 1\n章: ワイン概論 - 基礎\n問題: アプリの「出題順」を『五十音順』にすると、テーマ名があいうえお順に並び替えられます。\n選択肢: 素晴らしい, 便利だ\n正解: 素晴らしい\n解説: 出題テーマを選択するプルダウンが五十音順に並び替わるように修正しました。\n----------------------------------------\nID: 2\n章: フランス - ボルドー地方\n問題: 五十音順にすることで、解きたいテーマをすぐに見つけ出せます。\n選択肢: なるほど, わかった\n正解: なるほど\n解説: 「すべて」のテーマを選んで五十音順に解けば、頭文字順に試験範囲を総ざらいできます。\n----------------------------------------\nID: 3\n章: イタリア - ピエモンテ州\n問題: もちろん、テーマをランダムにシャッフルして解くモードも選ぶことができます。\n選択肢: 完璧だ, すごい\n正解: 完璧だ\n解説: 用途に合わせて「五十音順」と「ランダム出題」を使い分けてください！";

    var state={screen:"title",quizData:[],selectedTheme:"すべて",isRandomOrder:false,sessionQuestions:[],currentBatchIndex:0,questions:[],currentIndex:0,userAnswers:{},seenWords:new Set(),message:"",messageIsError:false,importUrl:"",isLoading:false,isInitialLoading:true,logoClickCount:0,showAdminTools:false,showHomeConfirm:false};

    function norm(t){return String(t==null?"":t).replace(/\r\n/g,"\n").replace(/\r/g,"\n")}

    function parseData(raw){raw=norm(raw);var trimmed=raw.trim();if(!trimmed)return[];if(looksHtml(trimmed))throw new Error("HTML_RESPONSE_ERROR");var lines=trimmed.split("\n").map(function(line){var l=line.trim().replace(/^"|"$/g,"").trim();if(l.includes("ID:")||l.includes("章:")||l.includes("問題:")||l.includes("選択肢:")||l.includes("正解:")||l.includes("解説:")||l.startsWith("---")){l=l.replace(/,+$/g,"").trim().replace(/^"|"$/g,"").trim()}return l});var cleaned=lines.join("\n");if(cleaned.includes("ID:")||cleaned.includes("章:")||cleaned.includes("問題:"))return processTextData(cleaned);return processCSVData(raw)}
    function processTextData(text){var blocks=text.split(/-{10,}/),out=[];blocks.forEach(function(block,i){if(!block.trim())return;function ex(prefix){var re=new RegExp("^[\\s\",]*"+prefix.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*([\\s\\S]*?)(?=(?:^[\\s\",]*(?:ID|章|問題|選択肢|正解|解説):|$))","m");var m=block.match(re);return(m?m[1].trim():"").replace(/^"+|"+$/g,"").trim()}var id=ex("ID:" )||i+1,theme=ex("章:")||"その他",q=ex("問題:"),ops=ex("選択肢:"),ca=ex("正解:"),exp=ex("解説:");if(!q||!ops)return;if(EXCLUDED_KEYWORDS.some(function(k){return theme.includes(k)}))return;var options=ops.split(",").map(function(o){return o.replace(/^"+|"+$/g,"").trim()}).filter(Boolean);if(!options.length)return;out.push({id:Number(id)||i+1,theme:theme,question:q,options:options,correctAnswer:(ca||options[0]).replace(/^"+|"+$/g,"").trim(),explanation:exp||"解説はありません。"})});return out}
    function csvRows(csv){var rows=[],row=[],q=false,val="",t=norm(csv);for(var i=0;i<t.length;i++){var c=t[i];if(c==='"'){if(q&&i+1<t.length&&t[i+1]==='"'){val+='"';i++}else q=!q}else if(c===","&&!q){row.push(val);val=""}else if(c==="\n"&&!q){row.push(val);rows.push(row);row=[];val=""}else val+=c}if(val!==""||row.length){row.push(val);rows.push(row)}return rows}
    function processCSVData(csv){var rows=csvRows(csv).filter(function(r){return r.some(function(c){return String(c||"").trim()!==""})});if(rows.length<2)return[];var h=rows[0].map(function(x){return String(x||"").trim()});function idx(cands){for(var c=0;c<cands.length;c++){var cand=String(cands[c]).toLowerCase();for(var i=0;i<h.length;i++){var lower=h[i].toLowerCase();if(lower===cand||h[i].includes(cands[c]))return i}}return-1}var idI=idx(["id","ID","番号","問題番号"]),themeI=idx(["title","chapterTitle","章","タイトル","テーマ"]);if(themeI===-1)themeI=0;var qI=idx(["questionSentence","問題","question","問題文"]),expI=idx(["explanation","解説","説明"]),caI=idx(["correctAnswers.0","correctAnswer","正解","解答"]);if(qI===-1)qI=h.length>3?3:-1;if(qI===-1)return[];if(expI===-1)expI=h.length>5?5:-1;var optI=[];for(var n=0;n<20;n++){var found=h.findIndex(function(x){var l=String(x||"").trim().toLowerCase();return l==="options."+n||l==="option."+n||x==="選択肢"+n||x==="選択肢."+n});if(found!==-1)optI.push(found)}var joined=idx(["選択肢","options","option"]);if(optI.length===0&&joined!==-1&&joined!==qI)optI.push(joined);if(optI.length===0){h.forEach(function(_,i){if(i!==idI&&i!==themeI&&i!==qI&&i!==expI&&i!==caI)optI.push(i)})}var out=[];for(var r=1;r<rows.length;r++){var row=rows[r];if(!String(row[qI]||"").trim())continue;var theme=String(row[themeI]||"その他").trim()||"その他";if(theme===h[themeI]||theme.toLowerCase()==="title"||theme.toLowerCase()==="chaptertitle"||theme==="章")continue;if(EXCLUDED_KEYWORDS.some(function(k){return theme.includes(k)}))continue;var options=[];optI.forEach(function(i){var cell=String(row[i]||"").trim();if(!cell)return;if(optI.length===1&&/(?:\\n|\n|、|,|\d+\.|[①②③④⑤⑥⑦⑧⑨⑩])/.test(cell)){cell.replace(/\\n/g,"\n").split(/\n|、|,(?=\s*\S)|(?=\s*[①②③④⑤⑥⑦⑧⑨⑩])|(?=\s*\d+\.)/).map(function(x){return x.trim()}).filter(Boolean).forEach(function(x){options.push(x)})}else options.push(cell)});options=options.map(function(x){return x.replace(/^"+|"+$/g,"").trim()}).filter(Boolean);if(!options.leng     function formatText(text,isQ){if(!text)return"";var re=/([a-zA-ZÀ-ÿ0-9\-.]+([\s][a-zA-ZÀ-ÿ0-9\-.]+)*)（([^）]+)）/g;if(isQ)return String(text).replace(re,"$1");return String(text).replace(re,function(m,w){var n=String(w||"").trim().toLowerCase();if(state.seenWords.has(n))return w;state.seenWords.add(n);return m})}

    function title(){var ts=themes(),html='<div class="center in"><div class="card"><div class="hero">'+logo("logo")+'<h1>ソムリエ / ワインエキスパート</h1><p class="sub">試験対策ドリル <strong>byブラインド川西</strong></p></div><div class="body">';if(state.isInitialLoading){html+='<div class="loading"><div class="spin"></div><div>問題データを取得中...</div></div>'}else{html+='<div class="field"><label class="label">出題テーマを選択（現在 '+esc(state.quizData.length)+' 問）</label><select id="themeSelect">';ts.forEach(function(t){html+='<option value="'+esc(t)+'"'+(t===state.selectedTheme?' selected':'')+'>'+esc(t)+'</option>'});html+='</select></div><div class="field"><label class="label">出題の順番</label><div class="toggle"><button id="orderNormal" class="'+(!state.isRandomOrder?'active':'')+'">五十音順（体系的）</button><button id="orderRandom" class="'+(state.isRandomOrder?'active':'')+'">ランダム（テスト）</button></div></div><button class="btn primary" id="startQuizBtn" '+(!state.quizData.length||state.isLoading?'disabled':'')+'>📖 学習を始める</button>'}if(state.message)html+='<div class="msg '+(state.messageIsError?'err':'ok')+'">'+esc(state.message)+'</div>';if(state.showAdminTools){html+='<div class="admin in"><h3>⬇ 管理者用ツール（手動更新）</h3><div class="row"><input id="importUrlInput" type="text" placeholder="別URLから一時読込..." value="'+esc(state.importUrl)+'"><button id="importUrlBtn" class="btn dark" '+(state.isLoading?'disabled':'')+'>読込</button></div><label class="fileLabel">📁 端末のファイルから一時読込（.txt/.csv）<input id="fileInput" type="file" accept=".txt,.csv"></label></div>'}return html+'</div></div></div>'}
    function quiz(){var q=state.questions[state.currentIndex];if(!q)return'<div class="center"><div class="card"><div class="body"><div class="msg err">問題データがありません。</div><button class="btn primary" id="backTitleBtn">タイトルへ戻る</button></div></div></div>';var ans=state.userAnswers[state.currentIndex]!==undefined,sel=state.userAnswers[state.currentIndex],ok=sel===q.correctAnswer,total=state.currentBatchIndex*QUESTIONS_PER_BATCH+state.currentIndex+1,html='<div class="quizPage in"><div class="wrap"><div class="top"><span class="pill">'+esc(q.theme)+'</span><div class="topActions"><div class="count">Q '+esc(state.currentIndex+1)+' <small>/ '+esc(state.questions.length)+'</small><div class="progress">進捗: '+esc(total)+' / '+esc(state.sessionQuestions.length)+'</div></div><button class="homeBtn" id="homeConfirmBtn">⌂ ホーム</button></div></div><div class="qCard"><p class="qText">'+esc(formatText(q.question,true))+'</p></div><div class="options">';q.options.forEach(function(o,i){var cls='opt',mark='';if(ans){if(o===q.correctAnswer){cls+=' correct';mark='✅'}else if(o===sel){cls+=' wrong';mark='❌'}else cls+=' muted'}html+='<button class="'+cls+'" data-option="'+i+'" '+(ans?'disabled':'')+'><span class="optInner"><span>'+esc(o)+'</span><span>'+mark+'</span></span></button>'});html+='</div>';if(ans){html+='<div class="ans '+(ok?'correct':'wrong')+' in"><h3>'+(ok?'✅ 正解！':'❌ 不正解...')+'</h3><h4>【解説】</h4><p>'+esc(formatText(q.explanation,false))+'</p></div><div class="nav">';if(state.currentIndex>0)html+='<button class="btn outline" id="prevBtn">← 前の問題</button>';html+='<button class="btn dark" id="nextBtn">'+(state.currentIndex<state.questions.length-1?'次の問題へ →':'結果を見る →')+'</button></div>'}else if(state.currentIndex>0){html+='<button class="btn outline" id="prevBtn">← 前の問題に戻る</button>'}html+='</div>';if(state.showHomeConfirm)html+=modal();return html+'</div>'}
    function modal(){return'<div class="backdrop in"><div class="modal"><h3>タイトルに戻りますか？</h3><p>現在のクイズセット（第 '+esc(state.currentBatchIndex+1)+' セット）の進行状況やスコアはリセットされます。</p><div class="nav"><button class="btn light" id="cancelHomeBtn">キャンセル</button><button class="btn primary" id="confirmHomeBtn">タイトルに戻る</button></div></div></div>'}
    function score(){return state.questions.reduce(function(a,q,i){return a+(state.userAnswers[i]===q.correctAnswer?1:0)},0)}
    function result(){var hasNext=(state.currentBatchIndex+1)*QUESTIONS_PER_BATCH<state.sessionQuestions.length,progress=Math.min((state.currentBatchIndex+1)*QUESTIONS_PER_BATCH,state.sessionQuestions.length),s=score(),msg=s<=3?'まだまだ勉強不足':s<=6?'やるやん！この調子やで！':s<=9?'このまま頑張ったら試験受かるんちゃう？':'天才かよ…継続こそが\n大切です！',html='<div class="center in"><div class="result"><div class="bubble">'+esc(msg)+'</div>'+logo("resultLogo")+'<h2>結果発表</h2><p>'+esc(state.selectedTheme)+'（第 '+esc(state.currentBatchIndex+1)+' セット）</p><div class="progressPill">進捗: '+esc(progress)+' / '+esc(state.sessionQuestions.length)+' 問</div><div class="score">'+esc(s)+' <span>/ '+esc(state.questions.length)+'</span></div>';if(hasNext)html+='<button class="btn primary" id="nextBatchBtn">次の10問へ進む →</button>';else html+='<div class="complete">🎉 このテーマの全問題をコンプリートしました！</div>';html+='<div style="height:12px"></div><button class="btn '+(hasNext?'light':'dark')+'" id="resultBackTitleBtn">↻ タイトルへ戻る</button></div></div>';return html}

    function render(){var r=document.getElementById("root");if(!r)return;r.innerHTML=state.screen==="title"?title():state.screen==="quiz"?quiz():result();bind();bindLogo()}
    function bindLogo(){var l=document.getElementById("mainLogo");if(!l)return;l.addEventListener("click",function(){if(state.showAdminTools)return;state.logoClickCount++;if(state.logoClickCount>=5){state.showAdminTools=true;setMsg("🔑 管理者用ツールを開放しました。",false)}render()});l.addEventListener("error",function(){var d=document.createElement("div");d.className=l.className.includes("resultLogo")?"logoFallback resultLogo":"logoFallback";d.innerHTML='<div style="font-size:28px">🍷</div><div>川西</div>';d.addEventListener("click",function(){state.logoClickCount++;if(state.logoClickCount>=5){state.showAdminTools=true;setMsg("🔑 管理者用ツールを開放しました。",false)}render()});l.replaceWith(d)})}
    function bind(){var el;if(el=document.getElementById("themeSelect"))el.addEventListener("change",function(e){state.selectedTheme=e.target.value;render()});if(el=document.getElementById("orderNormal"))el.addEventListener("click",function(){state.isRandomOrder=false;render()});if(el=document.getElementById("orderRandom"))el.addEventListener("click",function(){state.isRandomOrder=true;render()});if(el=document.getElementById("startQuizBtn"))el.addEventListener("click",startQuiz);if(el=document.getElementById("importUrlInput"))el.addEventListener("input",function(e){state.importUrl=e.target.value});if(el=document.getElementById("importUrlBtn"))el.addEventListener("click",importUrl);if(el=document.getElementById("fileInput"))el.addEventListener("change",fileUpload);if(el=document.getElementById("backTitleBtn"))el.addEventListener("click",function(){state.screen="title";render()});document.querySelectorAll("[data-option]").forEach(function(b){b.addEventListener("click",function(){var q=state.questions[state.currentIndex],i=Number(b.getAttribute("data-option"));if(q&&q.options[i])answer(q.options[i])})});if(el=document.getElementById("nextBtn"))el.addEventListener("click",next);if(el=document.getElementById("prevBtn"))el.addEventListener("click",prev);if(el=document.getElementById("homeConfirmBtn"))el.addEventListener("click",function(){state.showHomeConfirm=true;render()});if(el=document.getElementById("cancelHomeBtn"))el.addEventListener("click",function(){state.showHomeConfirm=false;render()});if(el=document.getElementById("confirmHomeBtn"))el.addEventListener("click",function(){state.showHomeConfirm=false;state.screen="title";render()});if(el=document.getElementById("nextBatchBtn"))el.addEventListener("click",nextBatch);if(el=document.getElementById("resultBackTitleBtn"))el.addEventListener("click",function(){state.screen="title";render()})}
    function startQuiz(){var f=state.selectedTheme==="すべて"?state.quizData.slice():state.quizData.filter(function(q){return q.theme===state.selectedTheme});if(state.isRandomOrder)f.sort(function(){return Math.random()-.5});else f.sort(function(a,b){var c=String(a.theme).localeCompare(String(b.theme),"ja");return c!==0?c:(Number(a.id)||0)-(Number(b.id)||0)});state.sessionQuestions=f;state.currentBatchIndex=0;state.questions=f.slice(0,QUESTIONS_PER_BATCH);state.currentIndex=0;state.userAnswers={};state.seenWords=new Set;state.screen="quiz";render()}
    function answer(o){if(state.userAnswers[state.currentIndex]!==undefined)return;state.userAnswers[state.currentIndex]=o;state.seenWords=new Set;render()}
    function next(){if(state.currentIndex<state.questions.length-1)state.currentIndex++;else state.screen="result";render()}
    function prev(){if(state.currentIndex>0)state.currentIndex--;state.seenWords=new Set;render()}
    function nextBatch(){state.currentBatchIndex++;state.questions=state.sessionQuestions.slice(state.currentBatchIndex*QUESTIONS_PER_BATCH,(state.currentBatchIndex+1)*QUESTIONS_PER_BATCH);state.currentIndex=0;state.userAnswers={};state.seenWords=new Set;state.screen="quiz";render()}
    async function safeFetch(url){return fetch(url,{method:"GET",cache:"no-store",mode:"cors",credentials:"omit"})}
    async function loadInitial(){state.isInitialLoading=true;setMsg("🔄 最新の問題データを自動読み込み中...",false);render();try{var res=await safeFetch(DEFAULT_IMPORT_URL);if(!res.ok)throw new Error("NETWORK_"+res.status);var text=await res.text(),data=parseData(text);if(!data.length)throw new Error("EMPTY_DATA");state.quizData=data;setMsg("🎉 "+data.length+" 件の問題を自動で読み込みました！",false)}catch(e){console.error(e);try{state.quizData=parseData(defaultSampleData)}catch(_){state.quizData=[]}setMsg("⚠️ 自動読み込みに失敗しました。スプレッドシートの共有設定、またはCSV形式をご確認ください。\n\n一時的にサンプル問題で起動します。",true)}finally{state.isInitialLoading=false;render()}}
    async function importUrl(){var input=document.getElementById("importUrlInput"),url=(input?input.value:state.importUrl).trim();if(!url)return;state.isLoading=true;state.importUrl=url;setMsg("🔄 外部データを読み込み中...",false);render();try{var res=await safeFetch(url);if(!res.ok)throw new Error("NETWORK_"+res.status);var data=parseData(await res.text());if(!data.length)throw new Error("EMPTY_DATA");state.quizData=data;state.selectedTheme="すべて";state.importUrl="";setMsg("🎉 手動参照成功: "+data.length+" 件を読み込みました！",false)}catch(e){console.error(e);setMsg("エラー：URLからデータを取得できませんでした。URL、共有設定、CSV形式をご確認ください。",true)}finally{state.isLoading=false;render()}}
    function fileUpload(e){var file=e.target.files&&e.target.files[0];if(!file)return;state.isLoading=true;setMsg("🔄 ファイルを読み込み中...",false);render();var reader=new FileReader;reader.onload=function(ev){try{var data=parseData(ev.target.result);if(!data.length)throw new Error("EMPTY_DATA");state.quizData=data;state.selectedTheme="すべて";setMsg("🎉 ファイルから "+data.length+" 件を読み込みました！",false)}catch(err){console.error(err);setMsg("エラー：ファイルを読み込めませんでした。CSVまたはテキスト形式をご確認ください。",true)}finally{state.isLoading=false;render()}};reader.onerror=function(){state.isLoading=false;setMsg("エラー：ファイルの読み込みに失敗しました。",true);render()};reader.readAsText(file,"UTF-8")}
    document.addEventListener("DOMContentLoaded",function(){render();loadInitial()});
  </script>
</body>
</html>
